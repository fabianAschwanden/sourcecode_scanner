# Secret-/PII-Scan als Build-Gate für das psp-Repo (docs/08).
# Gehört in das psp-Repo unter `.github/workflows/secret-scan.yml`.
#
# Verhalten:
#   - Pull Request / Push auf main: schneller HEAD-Scan, blockiert bei Funden >= gate.failOn.
#   - Nächtlich: Vollscan der History (.scanner-full.yaml).
#   - Findings landen im GitHub "Code scanning"-Tab (SARIF-Upload), auch wenn das Gate bricht.
#
# Voraussetzung: Das CLI-Image ist nach GHCR veröffentlicht (Workflow "Publish CLI Image" im
# Scanner-Repo) und für dieses Repo lesbar (public package ODER GHCR-Login mit Lesezugriff).
name: secret-scan

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'   # täglich 03:00 UTC: Vollscan
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # SARIF-Upload ins Code-Scanning

jobs:
  scan:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/fabianaschwanden/sourcecode-scanner-cli:latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # volle Historie (für den nächtlichen Full-Scan)

      - name: Run scanner (Gate)
        id: scan
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            CONFIG=.scanner-full.yaml
          else
            CONFIG=.scanner.yaml
          fi
          echo "Scanning with config $CONFIG"
          # Exit-Code-Vertrag (docs/08 §7): 0 ok · 1 Gate verletzt · 2 Fehler · 3 softFail-Funde.
          # Hinweis: KEIN führendes "scan" — das Jar IST der scan-Command, Argumente sind dessen Optionen.
          java -jar /app/quarkus-run.jar --config "$CONFIG" --output sarif

      - name: Upload SARIF
        if: always()   # auch bei Gate-Fail hochladen, damit Funde im Code-Scanning-Tab erscheinen
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: scan-reports/results.sarif
          category: sourcecode-scanner
