# Scanner-Konfiguration für ein Build-Gate in der CI (docs/08) — projektunabhängig.
# In die Wurzel des zu scannenden Repos als `.scanner.yaml` kopieren.
# Aufruf im CI: --config .scanner.yaml --output sarif  (das CLI-Image IST der scan-Command).
version: 1

scan:
  repositories:
    - type: localGit
      id: repo            # Anzeige-Label des Repos im Report — frei wählbar, z. B. den Repo-Namen eintragen.
      path: .
      branches: [main]

  history:
    # HEAD = aktueller Stand des Checkouts ohne History -> schnelles, blockierendes PR-Feedback.
    # Der nächtliche Deep-Scan nutzt eine zweite Config (.scanner-full.yaml, mode: full).
    # (Hinweis: ein echter DIFF-Modus ist im Scanner noch nicht implementiert; HEAD ist der schnelle Pfad.)
    mode: head

  concurrency:
    workers: 4
    detectorTimeoutSeconds: 30

  detectors:
    secrets:
      enabled: true
      ruleset: gitleaks-default
      entropy:
        enabled: true
        threshold: 4.5
        minLength: 20
        severity: MEDIUM
    pii:
      # PII standardmäßig aus — für ein Code-Repo meist Rauschen. Bei Bedarf einschalten.
      enabled: false
      patterns: [iban, creditcard, email]
    iac:
      enabled: false

  # Akzeptierte Altfunde: einmalig mit `--config .scanner.yaml --write-baseline` erzeugen und
  # einchecken, damit Bestandsfunde das Gate nicht dauerhaft rot färben.
  baseline: .scanner-baseline.json

  gate:
    failOn: HIGH            # ab HIGH bricht der Build
    failOnNewOnly: true     # nur neue (nicht in der Baseline stehende) Funde blocken
    softFail: false         # Einführungsphase: auf true setzen -> nie brechen, nur reporten
    requireSuppressionReason: false

  output:
    formats: [sarif]
    directory: ./scan-reports
    redact: true
