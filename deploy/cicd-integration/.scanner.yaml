# Scanner-Konfiguration für ein Build-Gate in der CI (docs/08) — projektunabhängig.
# Ablageort im Ziel-Repo: .github/scanner/.scanner.yaml
# Aufruf im CI: --config .github/scanner/.scanner.yaml --output sarif (das CLI-Image IST der Command).
# path: . bleibt das Repo-Root (Scan-Ziel = Arbeitsverzeichnis), nicht der Config-Ordner.
version: 1

scan:
  repositories:
    - type: localGit
      id: repo            # Anzeige-Label des Repos im Report — frei wählbar, z. B. den Repo-Namen eintragen.
      path: .
      branches: [main]

  history:
    # HEAD = aktueller Stand des Checkouts ohne History -> schnelles, blockierendes PR-Feedback.
    # Der nächtliche Deep-Scan nutzt eine zweite Config (.scanner-full.yaml, mode: full).
    # (Hinweis: ein echter DIFF-Modus ist im Scanner noch nicht implementiert; HEAD ist der schnelle Pfad.)
    mode: head

  concurrency:
    workers: 4
    detectorTimeoutSeconds: 30

  detectors:
    secrets:
      enabled: true
      ruleset: gitleaks-default
      entropy:
        enabled: true
        threshold: 4.5
        minLength: 20
        severity: MEDIUM
    pii:
      # PII standardmäßig aus — für ein Code-Repo meist Rauschen. Bei Bedarf einschalten.
      enabled: false
      patterns: [iban, creditcard, email]
    iac:
      enabled: false

  # Akzeptierte Altfunde: einmalig mit `--config .github/scanner/.scanner.yaml --write-baseline`
  # erzeugen und einchecken, damit Bestandsfunde das Gate nicht dauerhaft rot färben. Pfad relativ
  # zum Repo-Root (= Arbeitsverzeichnis des Scans), nicht zur Config-Datei.
  baseline: .github/scanner/.scanner-baseline.json

  # Pfad-Suppression (FR-10): rauschanfällige Dateien ausnehmen. Lockfiles, Minified-/Map-Assets und
  # Build-Output enthalten hochentropische Hashes (npm-integrity etc.) -> massenhaft Entropie-False-
  # Positives, aber keine echten Secrets. Glob; `**/` matcht in jedem Verzeichnis.
  suppress:
    - { path: '**/package-lock.json', reason: 'npm-Lockfile: Integrity-Hashes, keine Secrets' }
    - { path: '**/yarn.lock',         reason: 'yarn-Lockfile: Hashes, keine Secrets' }
    - { path: '**/pnpm-lock.yaml',    reason: 'pnpm-Lockfile: Hashes, keine Secrets' }
    - { path: '**/*.min.js',          reason: 'Minified-Asset: hochentropisch, kein Klartext-Secret' }
    - { path: '**/*.min.css',         reason: 'Minified-Asset' }
    - { path: '**/*.map',             reason: 'Source-Map: generiert' }
    - { path: '**/dist/**',           reason: 'Build-Output' }
    - { path: '**/build/**',          reason: 'Build-Output' }

  gate:
    failOn: HIGH            # ab HIGH bricht der Build
    failOnNewOnly: true     # nur neue (nicht in der Baseline stehende) Funde blocken
    softFail: false         # Einführungsphase: auf true setzen -> nie brechen, nur reporten
    requireSuppressionReason: false

  output:
    formats: [sarif]
    directory: ./scan-reports
    redact: true
