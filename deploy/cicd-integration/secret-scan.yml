# Secret-/PII-Scan als Build-Gate (docs/08) — projektunabhängige Vorlage.
# In das zu scannende Repo unter `.github/workflows/secret-scan.yml` kopieren.
#
# Verhalten:
#   - Pull Request / Push auf main: schneller HEAD-Scan, blockiert bei Funden >= gate.failOn.
#   - Nächtlich: Vollscan der History (.scanner-full.yaml).
#   - Findings landen im GitHub "Code scanning"-Tab (SARIF-Upload), auch wenn das Gate bricht.
#
# Voraussetzung: Das CLI-Image ist nach GHCR veröffentlicht (Workflow "Publish CLI Image" im
# Scanner-Repo) und für dieses Repo lesbar (public package ODER GHCR-Login mit Lesezugriff).
# Das Image gehört dem Scanner-Repo-Owner und ist für alle konsumierenden Projekte dasselbe.
name: secret-scan

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'   # täglich 03:00 UTC: Vollscan
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # SARIF-Upload ins Code-Scanning

jobs:
  scan:
    runs-on: ubuntu-latest
    container:
      # Veröffentlichtes CLI-Image des Scanners — die EINZIGE Stelle, die ggf. anzupassen ist.
      # Empfehlung: auf einen unveränderlichen Tag (:sha-… oder :<version>) pinnen statt :latest.
      # GitHub Actions erlaubt hier keine ${{ env.* }}-Variable, daher fest eingetragen.
      image: ghcr.io/fabianaschwanden/sourcecode-scanner-cli:latest
      # Privates Ziel-Repo + privates Image? Dann hier einloggen (Secret GHCR_PAT mit read:packages):
      # credentials:
      #   username: ${{ github.actor }}
      #   password: ${{ secrets.GHCR_PAT }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # volle Historie (für den nächtlichen Full-Scan)

      - name: Run scanner (Gate)
        id: scan
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            CONFIG=.github/scanner/.scanner-full.yaml
          else
            CONFIG=.github/scanner/.scanner.yaml
          fi
          echo "Scanning with config $CONFIG"
          # Output mitschneiden; den Gate-Exit-Code NICHT hier wirken lassen, sondern merken und im
          # Summarize-Step durchreichen — so läuft die Zusammenfassung immer und das Job-Ergebnis
          # spiegelt trotzdem den Exit-Code-Vertrag (docs/08 §7: 0 ok·1 Gate·2 Fehler·3 softFail).
          # Kein führendes "scan" — das Jar IST der scan-Command.
          set +e
          java -jar /app/quarkus-run.jar --config "$CONFIG" --output sarif 2>&1 | tee scan-output.txt
          RC=${PIPESTATUS[0]}
          echo "rc=$RC" >> "$GITHUB_OUTPUT"
          exit 0   # Gate-Ergebnis wird im Summarize-Step durchgereicht

      # Findings auf höchster Ebene sichtbar machen — Step Summary (oben auf der Run-Seite) +
      # Step-Name mit Zahl, ohne dass man Logs aufklappen oder das SARIF öffnen muss.
      - name: Summarize findings
        if: always()
        run: |
          # Berichtete Funde = Einträge im SARIF NACH Suppression/Baseline (das, was wirklich zählt).
          # Ein "ruleId" je Ergebnis -> robuste Zählung ohne jq.
          if [ -f scan-reports/results.sarif ]; then
            REPORTED="$(grep -o '"ruleId"' scan-reports/results.sarif | wc -l | tr -d ' ')"
          else
            REPORTED='?'
          fi
          # Gate-Status + blockierende Funde aus der Gate-Zeile (Exit-Code-Vertrag):
          LINE="$(grep -E '^Gate:' scan-output.txt | tail -1)"
          STATUS="$(printf '%s' "$LINE" | sed -nE 's/^Gate: ([A-Z]+).*/\1/p')"
          BLOCK="$(printf '%s' "$LINE" | sed -nE 's/.* ([0-9]+) blockierende.*/\1/p')"
          : "${STATUS:=UNBEKANNT}"; : "${BLOCK:=?}"
          if [ "$STATUS" = "PASS" ]; then ICON='✅'; elif [ "$STATUS" = "FAIL" ]; then ICON='❌'; else ICON='⚠️'; fi
          if [ "$REPORTED" = "0" ]; then HEAD="keine Funde"; else HEAD="$REPORTED Fund(e)"; fi
          {
            echo "## $ICON Secret-Scan: $HEAD (Gate $STATUS)"
            echo ""
            echo "| Metrik | Wert |"
            echo "|---|---|"
            echo "| Berichtete Funde (nach Suppression/Baseline) | $REPORTED |"
            echo "| Blockierend (≥ Gate-Schwelle) | $BLOCK |"
            echo "| Gate | $STATUS |"
            echo ""
            echo "Vollständiger Report: Artefakt \`scan-report-sarif\` (unten unter „Artifacts\")."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::notice title=Secret-Scan::$HEAD, $BLOCK blockierend, Gate $STATUS"
          # Gate-Exit-Code aus dem Scan-Step durchreichen (Job-Ergebnis unverändert).
          exit "${{ steps.scan.outputs.rc }}"

      # SARIF in den Code-Scanning-Tab laden. Benötigt GitHub Advanced Security (öffentliche Repos:
      # gratis; PRIVATE Repos: nur mit GHAS-Lizenz). Ohne GHAS scheitert der Upload mit "Resource not
      # accessible by integration" — daher standardmässig AUS, um diese Annotationen zu vermeiden.
      # Einschalten, wenn GHAS verfügbar ist: Repo-Variable SCANNER_UPLOAD_SARIF = 'true' setzen
      # (Settings → Secrets and variables → Actions → Variables). continue-on-error als Sicherheitsnetz.
      - name: Upload SARIF
        if: ${{ always() && vars.SCANNER_UPLOAD_SARIF == 'true' }}
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: scan-reports/results.sarif
          category: sourcecode-scanner

      # SARIF immer als Build-Artefakt ablegen — auch ohne GHAS einsehbar (Download im Run).
      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: scan-report-sarif
          path: scan-reports/results.sarif
          if-no-files-found: warn
