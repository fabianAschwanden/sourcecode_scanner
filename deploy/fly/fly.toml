# Fly.io-Konfiguration für den Source Code Scanner (Quarkus JVM + Angular/Quinoa).
# App-Name vor dem ersten Deploy anpassen bzw. via `fly launch` erzeugen lassen.
app = "sourcecode-scanner"
primary_region = "fra"   # Frankfurt; an Bedarf anpassen (z. B. zur DB-Region)

[build]
  dockerfile = "Dockerfile"

[env]
  # ghauth: produktiv mit GitHub-Login (OAuth2). Voraussetzung: Fly-Secrets GITHUB_CLIENT_ID/
  # GITHUB_CLIENT_SECRET/GITHUB_ADMIN_LOGINS gesetzt + GitHub OAuth App mit Callback
  # https://<app>.fly.dev/q/oidc/github. Alternativen: "prod,staging" (offen, Test) / "prod,server"
  # (klassisches OIDC). Überschreibt den Dockerfile-Default zur Laufzeit.
  QUARKUS_PROFILE = "prod,ghauth"
  # Quarkus lauscht in fast-jar standardmässig auf 8080; Host wird im Dockerfile auf 0.0.0.0 gesetzt.

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  # Horizontale Skalierung: mehrere Maschinen werden jetzt unterstützt. Voraussetzungen sind erfüllt —
  # (1) geteilter OIDC-Session-State über alle Pods (Fly-Secret OIDC_STATE_ENCRYPTION_SECRET, in
  # application.properties referenziert), damit der Login-Callback auf jeder Maschine entschlüsselt
  # werden kann; (2) DB-basierte Scan-Queue: jeder QUEUED-Lauf wird von genau einem Pod atomar
  # geclaimt (FOR UPDATE SKIP LOCKED), Fortschritt/Cancel über die DB, verwaiste Läufe werden nach
  # Heartbeat-Timeout requeued. Skalieren via `fly scale count N`.
  min_machines_running = 2
  max_machines_running = 4

  [[http_service.checks]]
    method = "GET"
    path = "/q/health/ready"
    interval = "15s"
    timeout = "3s"
    grace_period = "30s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"   # JVM + Scans: bei grossen Repos eher 2gb
