# Vorlage (docs/08 §4.3): Secret-Scan als blockierender GitHub-Actions-Job.
# In das Ziel-Repo unter .github/workflows/ kopieren. Exit-Code-Vertrag: 0 pass / 1 Gate / 2 Fehler / 3 softFail.
name: Secret Scan
on:
  pull_request:
  push:
    branches: [main]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # volle Historie für Diff/Full
      - name: Secret scan
        run: |
          docker run --rm -v "$PWD":/repo registry.company.com/sourcecode-scanner:latest \
            --config /repo/scanner.yaml --output sarif
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: scan-reports/results.sarif
