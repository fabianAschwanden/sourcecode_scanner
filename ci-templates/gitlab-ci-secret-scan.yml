# Vorlage (docs/08 §4.1): Secret-Scan-Job mit nativem GitLab-Secret-Detection-Report (IR-18).
# In .gitlab-ci.yml einbinden. allow_failure:false macht den Scan blockierend (Gate-Fail -> Pipeline stoppt).
secret-scan:
  stage: test
  image: registry.company.com/sourcecode-scanner:latest
  script:
    - scanner --config .scanner.yaml --output sarif,gitlab
  artifacts:
    when: always
    reports:
      secret_detection: scan-reports/gl-secret-detection-report.json
    paths: [scan-reports/]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  allow_failure: false
