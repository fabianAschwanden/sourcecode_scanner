quarkus.application.name=sourcecode-scanner

# Der Scanner hat zwei Betriebsmodi (docs/09 §9): den CLI-/CI-Lauf (Default, Phase 1) und den
# langlaufenden Web-Service (Profil 'server', additiv zu prod, Roadmap-Phase 4). CLI-Läufe sind
# DB- und IdP-frei; alle Server-Belange (Persistenz, OIDC, Security-Header) hängen am %server-Profil.

# --- Persistenz: Liquibase besitzt das Schema, Hibernate validiert nur (Blueprint §6) ---
# Der CLI-/CI-Lauf (Default-/prod-Profil) ist DB-frei: Datasource und Hibernate ORM sind inaktiv,
# damit der gebaute Runner ohne DB startet (OR-09). Persistenz ist nur in dev/test/server aktiv.
quarkus.datasource.active=false
quarkus.hibernate-orm.active=false
quarkus.hibernate-orm.schema-management.strategy=validate
quarkus.liquibase.migrate-at-start=false
quarkus.liquibase.change-log=db/changelog/db.changelog-master.xml
%dev.quarkus.datasource.active=true
%dev.quarkus.hibernate-orm.active=true
%test.quarkus.datasource.active=true
%test.quarkus.hibernate-orm.active=true
%server.quarkus.datasource.active=true
%server.quarkus.hibernate-orm.active=true
%server.quarkus.liquibase.migrate-at-start=true
# Dev/Test: PostgreSQL kommt automatisch über Dev Services (Container-Runtime nötig)

# --- Frontend via Quinoa (Blueprint §1) ---
quarkus.quinoa.ui-dir=webapp
quarkus.quinoa.build-dir=dist/webapp/browser
quarkus.quinoa.enable-spa-routing=true
%dev.quarkus.quinoa.dev-server.port=4200

# --- AuthN/AuthZ: OIDC BFF-Pattern (Blueprint §8) ---
# Session-Cookie statt Token im Browser; Rollen aus Client-Rollen des IdP.
# quarkus.oidc.enabled ist BUILD-TIME-fixiert: muss true sein, damit Profile wie server/ghauth den
# OIDC-Flow zur Laufzeit überhaupt nutzen können. Die tatsächliche Aktivierung steuert das
# RUNTIME-Flag quarkus.oidc.tenant-enabled (Default unten AUS — CLI/CI brauchen keinen IdP).
quarkus.oidc.enabled=true
quarkus.oidc.tenant-enabled=false
quarkus.oidc.application-type=web-app
# Hinter Fly/Reverse-Proxy: X-Forwarded-Proto/Host respektieren, damit die OIDC-redirect_uri https://
# und den korrekten Host nutzt (sonst http:// -> redirect_uri mismatch beim IdP).
quarkus.http.proxy.proxy-address-forwarding=true
quarkus.oidc.authentication.pkce-required=true
quarkus.oidc.roles.source=accesstoken
# Client-Rollen aus resource_access/<client>/roles lesen (Keycloak):
quarkus.oidc.roles.role-claim-path=resource_access/${OIDC_CLIENT_ID:sourcecode-scanner}/roles

# --- Profile (Blueprint §9): Auth in Dev/Test aus ---
%dev.quarkus.oidc.tenant-enabled=false
%dev.quarkus.keycloak.devservices.enabled=false
# Dev: keine echte Identität vorhanden (OIDC aus) -> ohne Zutun lieferte @RolesAllowed 403.
# Im Dev-Modus deaktiviert Quarkus die Sicherheits-Enforcement, damit UI/API ohne IdP nutzbar sind.
# Prod/Server bleiben über OIDC + RBAC gesichert (Profil %server).
%dev.quarkus.security.auth.enabled-in-dev-mode=false
# Dev: Dev-Services-Postgres + Liquibase-Migration, damit REST/UI lokal nutzbar sind.
%dev.quarkus.liquibase.migrate-at-start=true

%test.quarkus.oidc.tenant-enabled=false
%test.quarkus.keycloak.devservices.enabled=false
%test.quarkus.quinoa.enabled=false
%test.quarkus.http.test-port=0
# Tests nutzen Dev-Services-Postgres; Liquibase legt das Schema an, Hibernate validiert dagegen.
%test.quarkus.liquibase.migrate-at-start=true

# --- Server-Profil (Phase 4): langlaufender Web-Service mit DB + OIDC ---
# Start: java -Dquarkus.profile=prod,server -jar quarkus-run.jar
%server.quarkus.oidc.tenant-enabled=true
%server.quarkus.datasource.jdbc.url=${DB_URL}
%server.quarkus.datasource.username=${DB_USERNAME}
%server.quarkus.datasource.password=${DB_PASSWORD}
# Serverless-Postgres-freundlich (z. B. Neon): kleiner Pool + zügiger Acquisition-Timeout, damit ein
# autosuspendierter Endpoint sauber wieder hochfährt statt Verbindungen zu stauen. SSL gehört in DB_URL
# (?sslmode=require). Über DB_*-Properties bei Bedarf überschreibbar.
%server.quarkus.datasource.jdbc.max-size=${DB_POOL_MAX_SIZE:10}
%server.quarkus.datasource.jdbc.min-size=${DB_POOL_MIN_SIZE:0}
%server.quarkus.datasource.jdbc.acquisition-timeout=${DB_ACQUISITION_TIMEOUT:10}
%server.quarkus.oidc.auth-server-url=${OIDC_AUTH_SERVER_URL}
%server.quarkus.oidc.client-id=${OIDC_CLIENT_ID}
%server.quarkus.oidc.credentials.secret=${OIDC_CLIENT_SECRET}

# Ohne explizite Policy wären alle Endpoints trotz OIDC anonym erreichbar:
# im Server erfordert alles Login (BFF-Redirect), ausgenommen Health für den Orchestrator.
%server.quarkus.http.auth.permission.health.paths=/q/health,/q/health/*
%server.quarkus.http.auth.permission.health.policy=permit
%server.quarkus.http.auth.permission.authenticated.paths=/*
%server.quarkus.http.auth.permission.authenticated.policy=authenticated

# --- Staging-Profil: wie Server, aber OHNE OIDC (nur zum Hochfahren/DB-Test, NICHT produktiv) ---
# Start: java -Dquarkus.profile=prod,staging -jar quarkus-run.jar
# ACHTUNG: keine Zugriffskontrolle — alle Endpoints sind anonym erreichbar. Niemals mit echten Daten
# oder öffentlich ohne vorgelagerten Schutz betreiben. Für produktiven Betrieb das %server-Profil + OIDC.
%staging.quarkus.datasource.active=true
%staging.quarkus.hibernate-orm.active=true
%staging.quarkus.liquibase.migrate-at-start=true
%staging.quarkus.datasource.jdbc.url=${DB_URL}
%staging.quarkus.datasource.username=${DB_USERNAME}
%staging.quarkus.datasource.password=${DB_PASSWORD}
%staging.quarkus.datasource.jdbc.max-size=${DB_POOL_MAX_SIZE:10}
%staging.quarkus.datasource.jdbc.min-size=${DB_POOL_MIN_SIZE:0}
%staging.quarkus.datasource.jdbc.acquisition-timeout=${DB_ACQUISITION_TIMEOUT:10}
%staging.quarkus.oidc.tenant-enabled=false
%staging.quarkus.http.auth.permission.all.paths=/*
%staging.quarkus.http.auth.permission.all.policy=permit
%staging.quarkus.micrometer.export.prometheus.enabled=true
%staging.scanner.notifications.email.enabled=false
%staging.scanner.remediation.auto-fix.enabled=true
%staging.scanner.remediation.history-scrub.enabled=true
%staging.scanner.datasource.hash-pepper=${DATASOURCE_HASH_PEPPER:}
%staging.scanner.secrets.encryption-key=${SCANNER_SECRETS_KEY:}

# --- ghauth-Profil: produktiv mit GitHub als IdP (OAuth2 via Quarkus-GitHub-Provider) ---
# Start: java -Dquarkus.profile=prod,ghauth -jar quarkus-run.jar
# GitHub ist OAuth2, kein OIDC: quarkus.oidc.provider=github kapselt das (kein Discovery-URL nötig).
# Rollen kommen NICHT aus GitHub — der GitHubRolesAugmentor mappt den Login: in GITHUB_ADMIN_LOGINS
# gelistete Logins -> admin, jeder andere authentifizierte GitHub-Nutzer -> viewer.
%ghauth.quarkus.datasource.active=true
%ghauth.quarkus.hibernate-orm.active=true
%ghauth.quarkus.liquibase.migrate-at-start=true
%ghauth.quarkus.datasource.jdbc.url=${DB_URL}
%ghauth.quarkus.datasource.username=${DB_USERNAME}
%ghauth.quarkus.datasource.password=${DB_PASSWORD}
%ghauth.quarkus.datasource.jdbc.max-size=${DB_POOL_MAX_SIZE:10}
%ghauth.quarkus.datasource.jdbc.min-size=${DB_POOL_MIN_SIZE:0}
%ghauth.quarkus.datasource.jdbc.acquisition-timeout=${DB_ACQUISITION_TIMEOUT:10}
%ghauth.quarkus.oidc.tenant-enabled=true
%ghauth.quarkus.oidc.provider=github
%ghauth.quarkus.oidc.application-type=web-app
%ghauth.quarkus.oidc.client-id=${GITHUB_CLIENT_ID}
%ghauth.quarkus.oidc.credentials.secret=${GITHUB_CLIENT_SECRET}
# Fester Callback-Pfad = registrierte OAuth-App-Callback-URL (…/q/oidc/github). Ohne dies nimmt
# Quarkus den aufrufenden Pfad (/login) als redirect_uri -> mismatch beim IdP.
%ghauth.quarkus.oidc.authentication.redirect-path=/q/oidc/github
# Nach erfolgreichem Login zurück auf die ursprünglich angeforderte Seite (statt auf den Callback).
%ghauth.quarkus.oidc.authentication.restore-path-after-redirect=true
# Lokaler Logout: GitHub hat kein OIDC-RP-Logout (end_session), daher /q/oidc/logout = 404. Dieser
# Pfad löscht stattdessen das Session-Cookie lokal und leitet zur Login-Seite (WR-30).
%ghauth.quarkus.oidc.logout.path=/logout
%ghauth.quarkus.oidc.logout.post-logout-path=/login
# read:user genügt für den Login + Username (kein Repo-Scope nötig). Mehrere Scopes kommasepariert.
%ghauth.quarkus.oidc.authentication.scopes=read:user
# GitHub-spezifische Overrides der globalen OIDC-Defaults (sonst 403 statt Redirect):
# - PKCE aus: GitHub-OAuth-Apps unterstützen es nicht wie erwartet.
# - kein Keycloak-Rollen-Claim-Pfad (GitHub liefert keine Rollen); Rollen kommen aus dem
#   GitHubRolesAugmentor. Der leere Wert hebt den global gesetzten resource_access-Pfad auf.
%ghauth.quarkus.oidc.authentication.pkce-required=false
%ghauth.quarkus.oidc.roles.role-claim-path=
# Allowlist der Admin-Logins (kommasepariert, case-insensitive); vom GitHubRolesAugmentor gelesen.
%ghauth.scanner.auth.github.admin-logins=${GITHUB_ADMIN_LOGINS:}
# Eigene Login-Landing-Seite (WR-30): SPA-Shell + statische Assets bleiben öffentlich, damit unsere
# GitHub-Style-Loginseite ohne sofortigen Redirect erscheint. Geschützt sind nur die API und der
# Login-Trigger; /login ist authenticated und stösst dadurch den GitHub-OIDC-Redirect an.
%ghauth.quarkus.http.auth.permission.protected.paths=/api/*,/login,/logout
%ghauth.quarkus.http.auth.permission.protected.policy=authenticated
%ghauth.quarkus.http.auth.permission.public.paths=/*
%ghauth.quarkus.http.auth.permission.public.policy=permit
%ghauth.quarkus.http.header."Content-Security-Policy".value=default-src 'self'; style-src 'self' 'unsafe-inline'
%ghauth.quarkus.http.header."Referrer-Policy".value=no-referrer
%ghauth.quarkus.http.header."Permissions-Policy".value=camera=(), microphone=(), geolocation=()
%ghauth.quarkus.micrometer.export.prometheus.enabled=true
%ghauth.scanner.notifications.email.enabled=true
%ghauth.scanner.remediation.auto-fix.enabled=true
%ghauth.scanner.remediation.history-scrub.enabled=true
%ghauth.scanner.datasource.hash-pepper=${DATASOURCE_HASH_PEPPER:}
%ghauth.scanner.secrets.encryption-key=${SCANNER_SECRETS_KEY:}

# --- Security-Header im Server (Blueprint §8) ---
# style-src 'unsafe-inline': Angular injiziert Komponenten-Styles zur Laufzeit als <style>-Elemente.
%server.quarkus.http.header."Content-Security-Policy".value=default-src 'self'; style-src 'self' 'unsafe-inline'
%server.quarkus.http.header."Referrer-Policy".value=no-referrer
%server.quarkus.http.header."Permissions-Policy".value=camera=(), microphone=(), geolocation=()

# --- Observability (Phase 4, OR-09): Prometheus-Export nur im Server/Dev/Test, CLI bleibt unberührt ---
quarkus.micrometer.export.prometheus.enabled=false
%server.quarkus.micrometer.export.prometheus.enabled=true
%dev.quarkus.micrometer.export.prometheus.enabled=true
%test.quarkus.micrometer.export.prometheus.enabled=true

# --- E-Mail-Benachrichtigung (IR-52/53/54) ---
# Versand standardmässig AUS (CLI-Lauf bleibt mailfrei). Im Server-Profil aktivierbar; SMTP-Verbindung
# über quarkus.mailer.* (Credentials nur als Referenz, NFR-08). Dev/Test nutzen den Mock-Mailer
# (kein echter Versand), damit der Report-Pfad ohne SMTP testbar ist.
scanner.notifications.email.enabled=false
quarkus.mailer.from=scanner@example.com
%server.scanner.notifications.email.enabled=true
%dev.scanner.notifications.email.enabled=true
%dev.quarkus.mailer.mock=true
%test.scanner.notifications.email.enabled=true
%test.quarkus.mailer.mock=true

# --- Remediation (Phase 6, RMR-*) ---
# Sicherheitskritisch: standardmässig komplett AUS (global), opt-in zusätzlich pro Repo (RMR-02).
# Nur das %server-Profil aktiviert die Schalter; CLI/Dev bleiben unangetastet. Force-Push wird real
# nie ausgeführt (kein installiertes git-filter-repo, RMR-28). Token nur als Referenz (env:/vault:).
scanner.remediation.auto-fix.enabled=false
scanner.remediation.auto-fix.mode=proposal
scanner.remediation.auto-fix.branch-prefix=fix/scanner-
scanner.remediation.github.api-url=https://api.github.com
scanner.remediation.history-scrub.enabled=false
scanner.remediation.history-scrub.engine=git-filter-repo
# Im Server-Betrieb sind die Schalter aktivierbar; greifen aber erst mit dem Pro-Repo-Opt-in.
%server.scanner.remediation.auto-fix.enabled=true
%server.scanner.remediation.history-scrub.enabled=true
# Tests: Auto-Fix aktiv (Repo-Opt-in steuert), Scrub-Governance ebenfalls testbar.
%test.scanner.remediation.auto-fix.enabled=true
%test.scanner.remediation.history-scrub.enabled=true

# --- Externe Datenquellen (Phase 7) ---
# Pepper für das Hashing hochgeladener Werte (NFR-23): erschwert Rainbow-Table-Angriffe auf die
# gespeicherten Hashes. Leer = kein Pepper. Im Server-Betrieb als Secret-Referenz setzen.
scanner.datasource.hash-pepper=
%server.scanner.datasource.hash-pepper=${DATASOURCE_HASH_PEPPER:}

# --- UI-Secret-Verwaltung (WR-19) ---
# Schlüssel für DB-verschlüsselte Secrets (NFR-29/30); fehlt er, ist der Modus DB_ENCRYPTED deaktiviert
# (kein unverschlüsseltes Fallback). Nur Server-Profil, als Secret-Referenz/Env bereitstellen.
%server.scanner.secrets.encryption-key=${SCANNER_SECRETS_KEY:}
%dev.scanner.secrets.encryption-key=dev-only-not-for-production
%test.scanner.secrets.encryption-key=test-only-key
# Vault-Write-Modus ist nur aktiv, wenn ein Secret-Store verdrahtet ist (Stub: aus).
scanner.secrets.vault.enabled=false

# --- Container-Image (Release-Pipeline) ---
quarkus.container-image.name=${quarkus.application.name}
