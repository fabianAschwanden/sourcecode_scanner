# Matching-Hinweis für den Detektor:
#   - Vergleich auf normalisierter Form: Whitespace/Bindestriche entfernen,
#     Buchstaben in IBANs auf Großschreibung normalisieren.
#   - Greift nur als Suppression NACH dem Detektor-Treffer (der Fund wird
#     als "False Positive (Allowlist)" markiert, nicht als echtes Finding).

