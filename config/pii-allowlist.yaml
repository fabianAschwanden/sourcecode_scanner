# Diese Werte sind absichtlich syntaktisch gültig (IBAN: Mod-97 korrekt,
# Kreditkarte: Luhn-gültig) und tauchen in Doku, Tests und SDK-Beispielen auf —
# sie sind KEINE echten Konten/Karten.
