<header class="border-b border-default bg-surface px-6 py-4">
  <h1 class="text-lg font-semibold text-fg">{{ title() }}</h1>
  <nav class="mt-2 flex gap-4 text-sm">
    @for (link of links; track link.path) {
      <a
        [routerLink]="link.path"
        routerLinkActive="font-semibold text-accent"
        class="text-muted hover:text-accent"
        >{{ link.label }}</a
      >
    }
  </nav>
</header>
<main class="min-h-screen bg-canvas text-fg">
  <router-outlet />
</main>
