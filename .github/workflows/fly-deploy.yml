# Auto-Deploy nach Fly.io bei Push auf main.
# Fly baut das Image remote aus deploy/fly/Dockerfile (kein lokaler Docker/Maven-Build nötig).
# Voraussetzung: Repo-Secret FLY_API_TOKEN (siehe deploy/fly/README.md) und eine bereits per
# `fly launch` angelegte App + gesetzte fly secrets (DB_URL/DB_USERNAME/DB_PASSWORD, SCANNER_SECRETS_KEY …).
name: Fly Deploy

on:
  push:
    branches: [main]
    # Nur deployen, wenn deploy-relevante Dinge sich ändern (spart Deploys bei reinen Doku-Edits).
    paths:
      - 'src/**'
      - 'webapp/**'
      - 'pom.xml'
      - 'deploy/fly/**'
      - '.github/workflows/fly-deploy.yml'
  workflow_dispatch: {}

# Laufende Deploys desselben Branches abbrechen, damit nicht zwei gleichzeitig pushen.
concurrency:
  group: fly-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: flyctl deploy
        run: flyctl deploy --remote-only --config deploy/fly/fly.toml --dockerfile deploy/fly/Dockerfile
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
